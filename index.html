<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url("BACKGROUND.jpeg") no-repeat center fixed;
            background-size: cover;
            color: white;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .registration-board {
            backdrop-filter: blur(10px); 
            border-radius: 15px;
            padding: 30px;
            margin-top: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
        }

        .btn-custom {
            background-color: #00CCEE;
            color: black;
            font-weight: bold;
        }

        footer {
            background-color: rgba(0, 0, 0, 0.8);
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark px-3">

        <a class="navbar-brand" href="index.html">
            <img src=" LOGO.png" style="width:60px;"></a>

        <div class="navbar-nav me-auto">

            <a class="nav-link" href="index.html">Home</a>

            <a class="nav-link" href="index.html">Fare Matrix</a>

            <a class="nav-link" href="index.html">Schedule</a>

            <a class="nav-link" href="index.html">Help</a>

        </div>

        <div class="navbar-nav">

            <a class="nav-link" href="https://storage.googleapis.com/oa_disk001/obangeles/68/documents/class-2035/folder-10762/1772587898-2516.pdf">Book Now</a>

            <button class="btn btn-primary btn-sm" href="index.html">Create Account</button>
        </div>
    </nav>

    <div class="container d-flex justify-content-center">
        <div class="registration-board col-md-8">
            <div class="row">
               <div class="col-md-4 text-center">
                 <img src="PROFILEPIC.jpeg" id="profileDisplay" class="profile-pic mb-3" alt="Profile">
                  <input type="file" id="fileInput" class="form-control form-control-sm mb-2" accept="image/*">
                  <button class="btn btn-custom w-100" onclick="  uploadPhoto()">Upload Photo</button>
                    </div>

                <div class="col-md-8">

                    <br>

                    <h2 class="text-uppercase" style="font-family:'Courier New', momospace;" >Registration</h2>

                    <details> 
                        <p class="small text-info">Please fill out all fields in the registration form with accuracy. Once you have completed the form, please review your details and click "Create my account" to finish the form.</p>
                        <summary>
                        INSTRUCTIONS:
                        </summary>
                    </details>

                    <br>
                    
                    <form id="regForm">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label>First Name</label>
                                <input type="text" placeholder="Enter First Name..." class="form-control">
                            </div>
                            <div class="col-md-6 mb-2">
                                <label>Last Name</label>
                                <input type="text" placeholder="Enter Last Name..." class="form-control">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-2">
                                <label>Age</label>
                                <input type="number" placeholder="Enter Age..." id="userAge" class="form-control">
                            </div>

                            <div class="col-md-8 mb-2">
                                <label>Contact Number</label>
                                <input type="text" placeholder="Enter Contact Number..." class="form-control">
                            </div>
                        </div>

                        <div class="mb-2">
                            <label>Email</label>
                            <input type="email" placeholder="Enter Email..." class="form-control">
                        </div>
                        
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label small">
                                I accept the <a href="https://storage.googleapis.com/oa_disk001/obangeles/68/documents/class-2035/folder-10762/1772587898-2516.pdf" class="text-info">Terms of Use</a>
                            </label>
                        </div>

                        <button type="button" class="btn btn-custom w-100 mb-2" onclick="createAccount()">Create my account</button>
                        <button type="reset" class="btn btn-light w-100">Cancel</button>

                    </form>
                </div>
            </div>
        </div>
    </div>

    <br>
    <br>
    <br>

    <footer>
        Cassandra Nikki C. Mallari | 9 Ruby ©2026
    </footer>

<script>
    function uploadPhoto() {
        const fileInput = document.getElementById('fileInput');
        const profileDisplay = document.getElementById('profileDisplay');
        
        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();

            reader.onload = function(e) {
                profileDisplay.src = e.target.result;
                alert("Your profile pic has been uploaded.");
            };

            reader.readAsDataURL(fileInput.files[0]);
        } else {
            alert("Please select a file first!");
        }
    }

    function createAccount() {
        let age = document.getElementById('userAge').value;
        
        if (age === "") {
            alert("Please enter your age first!");
        } 
        else if (age < 1) {
            alert("Please enter a valid age!");
        }
        else {
            alert("To register, click Ok");
        }
    }
</script>
